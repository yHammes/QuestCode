<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quest Code</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        body {
            background-color: #020b1f;
            color: white;
            font-family: 'Inter', sans-serif;

            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        form {
            text-align: center;
        }

        h1 {
            font-size: 40px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        h1 span {
            color: #3b82f6;
        }

        h5 {
            color: #64748b;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 400;
            margin-top: 0;
            margin-bottom: 40px;
        }

        .titulo-secao {
            font-size: 11px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            letter-spacing: 2px;
            color: #64748b;
            text-transform: uppercase;
            margin-top: 25px;
            margin-bottom: 12px;
            display: block;
        }

        input[type="text"] {
            width: 350px;
            height: 35px;
            background: transparent;
            border: none;
            border-bottom: 1px solid #1e293b;
            color: white;
            text-align: center;
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            outline: none;
            margin-bottom: 20px;
        }

        input[type="radio"] {
            display: none;
        }

        .opcao-label {
            border: 1px solid #334155;
            width: 110px;
            padding: 15px 0;
            text-align: center;

            display: inline-block;
            cursor: pointer;
            color: #94a3b8;
            transition: all 0.2s ease;
        }

        input[type="radio"]:checked+.opcao-label {
            border-color: #3b82f6;
            color: white;
            background-color: #0d1b3e;
        }

        button {
            width: 350px;
            height: 45px;
            margin-top: 30px;
            background-color: #4c8df6;
            color: white;
            border: none;
            cursor: pointer;

        }

        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
    </style>

</head>

<body>
    <div class="container">
        <h1>CodeQuest.</h1>
        <h5>Preveja a saída de 10 trechos de código. Uma rodada, uma pontuação.</h5>

        <form id="formJogo" action="../QuizScreen/telaQuiz.html">

            <br>
            <label for="nome">NOME</label>
            <br><br>


            <input type="text" id="name" placeholder="Seu nome">

            <div class="Dificuldades-options">

                <br>
                <input type="radio" name="dificuldade" id="facil" value="facil">
                <label for="facil" class="opcao-label">Facil</label>

                <input type="radio" name="dificuldade" id="medio" value="medio">
                <label for="medio" class="opcao-label">Médio</label>

                <input type="radio" name="dificuldade" id="dificil" value="dificil">
                <label for="dificil" class="opcao-label">Difícil</label>

                <br>
            </div>



            <button type="submit">Começar jogo</button>






        </form>
    </div>
</body>


<script>
    const form = document.getElementById('formJogo');
    const inputNome = document.getElementById('name');

    form.addEventListener('submit', function (event) {
        event.preventDefault();

        const nome = inputNome.value.trim();

        const radioDificuldade = document.querySelector('input[name="dificuldade"]:checked')

        if (nome == "") {
            alert("Por favor, digite seu nome!")
            return;
        }

        if (!radioDificuldade) {
            alert("por favor, selecione uma dificuldade!")
            return;
        }

        const dificuldade = radioDificuldade.value;

        localStorage.setItem('nomeJogador', nome);
        localStorage.setItem('dificuldade', dificuldade);

        console.log("=== DADOS SALVOS COM SUCESSO ===")
        console.log("Nome do Jogador:", localStorage.getItem('nomeJogador'));
        console.log("dificuldade Escolhida", localStorage.getItem('dificuldade'));

        setTimeout(function () {
            window.location.href = '../QuizScreen/telaQuiz.html';
        }, 800);
    });
</script>

</html>
