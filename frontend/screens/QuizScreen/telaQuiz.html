<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuestCode</title>
    <script
      src="https://kit.fontawesome.com/4abcb7b86d.js"
      crossorigin="anonymous"
    ></script>
    <!-- <link rel="stylesheet" href="style.css" /> -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container mt-5 pt-5" style="max-width: 700px">
      <div
        id="player-info"
        class="d-flex justify-content-between align-items-center mb-4 text-secondary small"
      >
        <div id="player_name">Usuario teste</div>
        <div class="d-flex gap-4">
          <span><strong>01</strong> / 10</span>
          <span>SCORE <strong>0</strong></span>
        </div>
      </div>

      <div id="progress-bar"
        class="progress"
        role="progressbar"
        aria-label="Basic example"
        aria-valuenow="0"
        aria-valuemin="0"
        aria-valuemax="100"
      >
        <div class="progress-bar" style="width: 0%"></div>
      </div>

      <div class="card mt-4" style="max-width: 100%; height: 360px">
        <div class="card-header">Qual valor o codigo abaixo retorna?</div>
        <div id="question-box" class="card-body">asdasdasdasdasdas</div>
      </div>

      <div id="response_local" class="mt-3">
        <div class="mb-3 text-white text-capitalize">
          <label
            for="formGroupExampleInput"
            class="form-label text-decoration-underline"
            >Digite sua resposta:</label
          >
          <div>
            <input
              type="text"
              class="form-control"
              id="response"
              placeholder="Digite aqui sua resposta"
            />
            <input
              style="width: 100%"
              class="btn btn-primary text-center mt-2"
              type="submit"
              value="Enviar"
              onclick=""
            />
          </div>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
  </body>
</html>
